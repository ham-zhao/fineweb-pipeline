name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: 代码风格检查 ─────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ scripts/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501 \
            --exclude=__pycache__,.venv \
            --statistics

  # ── Job 2: 导入检查（无需 GPU 和大模型）──────────────────────────
  import-check:
    name: Import Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          # 仅安装 CPU 版 PyTorch（CI 无 GPU/MPS）
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pyyaml tqdm transformers tokenizers \
                      scikit-learn matplotlib fasttext-wheel \
                      trafilatura langdetect xxhash

      - name: Check module imports
        run: |
          python -c "from src.utils.config_loader import load_run_config; print('✅ config_loader')"
          python -c "from src.gen1.pipeline import Gen1Pipeline; print('✅ gen1.pipeline')"
          python -c "from src.gen2.quality_classifier import Gen2QualityClassifier; print('✅ gen2.quality_classifier')"
          python -c "from src.gen3.classifier_ensemble import ClassifierEnsemble; print('✅ gen3.classifier_ensemble')"
          python -c "from src.dedup.minhash_dedup import MinHashLSH; print('✅ minhash_dedup')"
          python -c "from src.gen1_zh.chinese_quality_filter import ChineseQualityFilter; print('✅ gen1_zh')"

  # ── Job 3: Smoke Test（1K 文档，使用合成数据）────────────────────
  smoke-test:
    name: Smoke Test (Gen1 + Gen2)
    runs-on: ubuntu-latest
    needs: import-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pyyaml tqdm transformers tokenizers \
                      scikit-learn matplotlib fasttext-wheel \
                      trafilatura langdetect xxhash

      - name: Create synthetic test data
        run: |
          python - <<'EOF'
          import json, random, os
          from pathlib import Path

          Path("data/raw").mkdir(parents=True, exist_ok=True)
          Path("data/reference").mkdir(parents=True, exist_ok=True)
          Path("results").mkdir(parents=True, exist_ok=True)

          # 生成合成英文文档（模拟 CC 数据）
          templates = [
              "The {} is a well-known phenomenon in {}. Scientists have studied it extensively and found that {}.",
              "According to recent research on {}, the {} demonstrates significant improvements in {}.",
              "In the field of {}, {} plays a crucial role. Multiple studies confirm that {}.",
          ]
          words = ["science", "technology", "biology", "physics", "chemistry", "mathematics",
                   "research", "data", "analysis", "model", "system", "process", "method"]
          random.seed(42)

          with open("data/raw/synthetic_test.jsonl", "w") as f:
              for i in range(200):
                  tmpl = random.choice(templates)
                  text = tmpl.format(*random.choices(words, k=3))
                  # 重复几次使文档足够长
                  text = " ".join([text] * 5)
                  doc = {"text": text, "url": f"https://example.com/{i}", "source": "synthetic"}
                  f.write(json.dumps(doc) + "\n")
          print("✅ 合成测试数据生成完成")
          EOF

      - name: Set smoke_test config
        run: |
          python - <<'EOF'
          import yaml
          from pathlib import Path

          cfg = {
              "run_mode": "smoke_test",
              "random_seed": 42,
              "smoke_test": {
                  "doc_limit": 200,
                  "eval_sample_size": 50,
                  "audit_sample_size": 10,
                  "rewrite_count": 5,
              },
              "full_run": {
                  "doc_limit": 50000,
                  "eval_sample_size": 1000,
                  "audit_sample_size": 50,
                  "rewrite_count": 300,
              },
          }
          Path("configs").mkdir(exist_ok=True)
          with open("configs/run_config.yaml", "w") as f:
              yaml.dump(cfg, f)
          print("✅ run_config.yaml 设置为 smoke_test 模式")
          EOF

      - name: Run Gen1 smoke test
        run: |
          python scripts/run_gen1.py \
            --input data/raw/synthetic_test.jsonl \
            --no-eval
        env:
          PYTHONPATH: .

      - name: Run Gen2 smoke test
        run: |
          python scripts/run_gen2.py \
            --top-fraction 0.30
        env:
          PYTHONPATH: .

      - name: Verify outputs
        run: |
          python - <<'EOF'
          from pathlib import Path
          import sys

          # 检查 Gen1 输出
          gen1_found = any(
              p.exists() for p in [
                  Path("results/smoke_test/gen1_output/gen1_output.jsonl"),
                  Path("results/gen1_output/gen1_output.jsonl"),
              ]
          )
          if not gen1_found:
              print("❌ Gen1 输出未找到")
              sys.exit(1)
          print("✅ Gen1 输出存在")

          print("✅ Smoke Test 通过")
          EOF

  # ── Job 4: 中文过滤器单元测试 ──────────────────────────────────
  test-chinese:
    name: Chinese Filter Unit Tests
    runs-on: ubuntu-latest
    needs: import-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install numpy pyyaml

      - name: Run Chinese filter tests
        env:
          PYTHONPATH: .
        run: |
          python - <<'EOF'
          from src.gen1_zh.chinese_text_utils import (
              count_chinese_chars, char_type_ratio, detect_script,
              compute_spam_score, estimate_zh_tokens,
          )
          from src.gen1_zh.chinese_quality_filter import ChineseQualityFilter

          # 测试 1：字符计数
          text_zh = "人工智能是计算机科学的一个分支，致力于创造智能机器。"
          n = count_chinese_chars(text_zh)
          assert n > 10, f"中文字符计数失败: {n}"
          print(f"✅ count_chinese_chars: {n}")

          # 测试 2：字符类型分布
          ratios = char_type_ratio(text_zh)
          assert ratios["chinese"] > 0.5, f"中文占比应超过50%: {ratios}"
          print(f"✅ char_type_ratio: zh={ratios['chinese']:.2f}")

          # 测试 3：简繁体检测
          simp = detect_script("这是一段简体中文文章，包含了很多日常用语和表达。")
          print(f"✅ detect_script (simplified sample): {simp}")

          # 测试 4：质量过滤器 - 正常文档应通过
          good_text = (
              "人工智能（AI）是计算机科学的一个重要分支。\n"
              "它致力于创造能够模仿人类思维的智能机器。\n"
              "机器学习是人工智能的核心技术之一。\n"
              "深度学习通过神经网络模型实现了许多突破性进展。\n"
          ) * 10  # 重复以达到长度要求
          f = ChineseQualityFilter()
          ok, reason = f.check(good_text)
          print(f"✅ 正常文档过滤结果: passes={ok}, reason='{reason}'")

          # 测试 5：垃圾文档应被过滤
          spam_text = (
              "点击立即购买！限时优惠！加微信咨询！加微信咨询！加微信咨询！"
              "SEO关键词优化百度排名！点击立即购买！扫码加微信！"
          ) * 20
          score = compute_spam_score(spam_text)
          print(f"✅ 垃圾评分: {score:.3f} (期望 > 0.3)")

          # 测试 6：Token 估算
          tokens = estimate_zh_tokens(text_zh)
          assert tokens > 0, "Token 估算应大于 0"
          print(f"✅ estimate_zh_tokens: {tokens}")

          print("\n✅ 所有中文过滤器测试通过")
          EOF
