# configs/api_config.yaml
# 第三代 Pipeline 中 LLM 改写环节的 API 配置
# 支持 anthropic / deepseek / openai 三个 provider

provider: "anthropic"   # 可选: "anthropic" | "deepseek" | "openai"
api_key: "YOUR_API_KEY_HERE"  # 实际密钥请存入 .env 文件或环境变量 FINEWEB_API_KEY

# 各 provider 的模型配置
anthropic:
  model: "claude-sonnet-4-6"   # 改写任务用 Sonnet，性价比最优（输出 $15/M vs Opus $75/M）
  max_tokens: 1024
  temperature: 0.3   # 低温度保证改写质量稳定

deepseek:
  model: "deepseek-chat"
  max_tokens: 1024
  temperature: 0.3

openai:
  model: "gpt-4o-mini"   # 改写任务用 mini，成本可控
  max_tokens: 1024
  temperature: 0.3

# 改写 prompt 配置（英文 prompt，确保输出语言与输入一致）
rephrasing:
  system_prompt: |
    You are a professional text quality rewriter. Your task is to rewrite low-quality web text into high-quality, information-dense, clearly expressed educational content.

    Requirements:
    1. Preserve the core information and facts from the original text
    2. Remove marketing language, SEO stuffing, and boilerplate expressions
    3. Improve fluency, coherence, and logical flow
    4. Output length should be approximately 80-100% of the original
    5. Output ONLY the rewritten text, with no preamble, prefix, or explanation
    6. IMPORTANT: Write in the SAME LANGUAGE as the input text

  user_prompt_template: "Rewrite the following text:\n\n{text}"

  # API 调用限制
  requests_per_minute: 50
  max_retries: 3
  retry_delay: 2   # 秒
