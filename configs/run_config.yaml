# configs/run_config.yaml
# 数据规模控制：smoke_test / full_run
# 所有 pipeline 和 notebook 统一读取此文件的 run_mode 字段

run_mode: "smoke_test"   # 可选: "smoke_test" | "full_run"

smoke_test:
  doc_limit: 12000
  eval_sample_size: 500
  audit_sample_size: 50
  llm_label_count: 500
  llm_label_concurrency: 10
  rewrite_count: 99999   # 全量改写：不限制数量，所有 LQ 文档均送去改写
  rewrite_ratio: 0.25
  rewrite_concurrency: 10
  description: "20-30分钟跑完，验证代码 + 产出有统计意义的对比数据"

full_run:
  doc_limit: 100000
  eval_sample_size: 2000
  audit_sample_size: 100
  llm_label_count: 1000
  llm_label_concurrency: 20
  rewrite_count: 99999   # 全量改写：不限制数量，所有 LQ 文档均送去改写
  rewrite_ratio: 0.10
  rewrite_concurrency: 20
  description: "2-3小时跑完，产出最终展示级结果"

# LLM 改写配置
rewrite:
  provider: "anthropic"
  model: "claude-haiku-4-5-20251001"
  max_retries: 3
  timeout_seconds: 30
  quality_gate: 0.5

# 随机种子，确保可复现
random_seed: 42

# 数据路径（相对于项目根目录）
paths:
  raw_data: "data/raw"
  gen1_output: "data/gen1_output"
  gen2_output: "data/gen2_output"
  gen3_output: "data/gen3_output"
  reference_data: "data/reference"
  results: "results"
